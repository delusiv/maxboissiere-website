<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonyJam 2024 - Max Boissiere</title>
    <meta name="description" content="Event coverage cinematography for PonyJam 2024 game jam.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') ||
                (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="stylesheet" href="../style.css">
    <script src="../header-loader.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="project-page">
        <div id="nav-top"></div>

        <div class="project-hero">
            <h1>PonyJam 2024</h1>

            <div class="videos-container">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/LyRJLxyIDGk"
                            title="PonyJam 2024 Event Coverage"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            allowfullscreen
                            loading="lazy">
                    </iframe>
                </div>
            </div>

        </div>

        <div class="project-details">
            <div class="detail-section">
                <h3>About</h3>
                <p>Event coverage for PonyJam 2024, a local music event. Captured the energy of the night.</p>
            </div>

            <div class="detail-section">
                <h3>Role</h3>
                <p>Director of Photography</p>
            </div>

            <div class="detail-section">
                <h3>Focus</h3>
                <ul>
                    <li>Event documentation</li>
                    <li>Community energy capture</li>
                </ul>
            </div>
        </div>

        <div class="stills-gallery">
            <h3>Stills</h3>
            <div class="stills-grid">
                <div class="still-item">
                    <img src="../gallery/pj2.png" alt="Event atmosphere" loading="lazy">
                </div>
                <div class="still-item">
                    <img src="../gallery/pj3.png" alt="Developers at work" loading="lazy">
                </div>
                <div class="still-item">
                    <img src="../gallery/pj4.png" alt="Community moments" loading="lazy">
                </div>
            </div>
        </div>

        <div id="nav-bottom"></div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../footer-loader.js"></script>

    <script src="../script.js"></script>
</body>
</html>
