<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granite Reef Recreation Area - Max Boissiere</title>
    <meta name="description" content="Cinematography project at Granite Reef Recreation Area showcasing natural landscapes and outdoor recreation filming.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') ||
                (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="stylesheet" href="../style.css">
    <script src="../header-loader.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="project-page">
        <div id="nav-top"></div>

        <div class="project-hero">
            <h1>Granite Reef Recreation Area</h1>
        </div>

        <div class="videos-container">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/2XKAXe2ZiOU"
                        title="Granite Reef Recreation Area Video"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="project-details">
            <div class="detail-section">
                <h3>About</h3>
                <p>Capturing the natural beauty of Arizona's Granite Reef Recreation Area landscape.</p>
            </div>

        </div>

        <div class="stills-gallery">
            <h3>Stills</h3>
            <div class="stills-grid">
                <div class="still-item">
                    <img src="../gallery/grra2.png" alt="Granite Reef Recreation Area landscape">
                </div>
                <div class="still-item">
                    <img src="../gallery/grra1.png" alt="Outdoor recreation activities">
                </div>
                <div class="still-item">
                    <img src="../gallery/grra3.png" alt="Natural Arizona scenery">
                </div>
                <div class="still-item">
                    <img src="../gallery/grra4.png" alt="Outdoors">
                </div>
            </div>
        </div>

        <div id="nav-bottom"></div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../footer-loader.js"></script>

    <script src="../script.js"></script>
</body>
</html>
